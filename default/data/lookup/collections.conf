# KV store collections for rest-storage-passwords-manager
# https://help.splunk.com/en/data-management/splunk-enterprise-admin-manual/10.2/configuration-file-reference/10.2.0-configuration-file-reference/collections.conf

[credential_expiry]
field.expiry_date = string
field.credential_key = string

[credential_tags]
field.credential_key = string
field.tags = string

[tag_definitions]
field.tag_name = string
field.color = string
field.description = string

[password_policy]
field.policy_key = string
field.enabled = bool
field.min_length = number
field.max_length = number
field.requireUppercase = bool
field.requireLowercase = bool
field.requireDigits = bool
field.requireSpecial = bool
field.minUppercase = number
field.minLowercase = number
field.minDigits = number
field.minSpecial = number
field.bannedPasswords = string
